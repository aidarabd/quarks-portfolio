# Netlify configuration for the Quarks Code Next.js site.
# The official Next.js runtime (@netlify/plugin-nextjs) is auto-installed by
# Netlify and handles SSR, middleware (next-intl locale routing), and image
# optimization — no extra adapter needed.

[build]
  command = "next build"
  publish = ".next"

[build.environment]
  # Next.js 15 requires Node 18.18+; pin a current LTS to avoid build failures.
  NODE_VERSION = "20"
